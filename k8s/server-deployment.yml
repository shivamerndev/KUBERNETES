apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-server-deployment
spec:
  selector:
    matchLabels:
      app: main-server
  replicas: 2
  template:
    metadata:
      labels:
        app: main-server
    spec:
      containers:
        - name: express-server-container
          image: k8s-check
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"